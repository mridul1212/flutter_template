name: flutter_template
description: "Flutter boilerplate — clean architecture, BLoC/Cubit, onboarding, auth, token cache."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  google_fonts: ^6.3.0
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  dio: ^5.9.0
  connectivity_plus: ^6.1.1
  internet_connection_checker: ^3.0.1
  package_info_plus: ^8.3.0
  pub_semver: ^2.2.0
  url_launcher: ^6.3.1
  flutter_local_notifications: ^21.0.0
  go_router: ^17.2.1
  app_links: ^7.0.0
  intl: ^0.20.2
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/config/
    - assets/mock/
    - assets/mock/features/
